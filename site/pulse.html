<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANVIL Pulse — AI Intelligence Terminal</title>
<meta name="description" content="Real-time AI industry updates for AI-powered specialists. 10-second briefings. No newsletters. Just what matters.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'%3E%3Cpath d='M14 2L3 26h6l5-12 5 12h6L14 2z' fill='%23e87a2e'/%3E%3C/svg%3E">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c1117; --bg-card: #161b22; --bg-elevated: #1c2333;
  --border: #30363d; --border-active: #58a6ff;
  --text: #e6edf3; --text-dim: #8b949e; --text-muted: #6e7681;
  --orange: #e87a2e; --teal: #5bc0be; --yellow: #ffd166;
  --green: #3fb950; --red: #f85149; --blue: #58a6ff;
  --radius: 8px; --max-w: 960px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
  --mono: 'SFMono-Regular', 'Cascadia Code', 'Consolas', monospace;
}
html { font-size: 15px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }

/* Terminal header */
.pulse-header {
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  padding: 16px 24px; position: sticky; top: 0; z-index: 10;
}
.pulse-header-inner {
  max-width: var(--max-w); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  flex-wrap: wrap;
}
.pulse-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 800; font-size: 1.1rem; color: var(--text);
  text-decoration: none;
}
.pulse-brand svg { width: 22px; height: 22px; }
.pulse-brand .pulse-label {
  background: var(--orange); color: #000; font-size: 0.65rem;
  padding: 2px 6px; border-radius: 3px; font-weight: 700; letter-spacing: 1px;
}
.pulse-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75rem; color: var(--green); font-family: var(--mono);
}
.pulse-status .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  animation: blink 2s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Niche filter bar */
.filter-bar {
  max-width: var(--max-w); margin: 0 auto; padding: 12px 24px;
  display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.75rem; font-weight: 600;
  padding: 6px 14px; border-radius: 100px; cursor: pointer;
  white-space: nowrap; transition: all 0.2s;
}
.filter-chip:hover { border-color: var(--text-dim); color: var(--text); }
.filter-chip.active {
  background: var(--orange); border-color: var(--orange); color: #000;
}

/* Daily hint card */
.daily-hint {
  max-width: var(--max-w); margin: 16px auto; padding: 0 24px;
}
.hint-card {
  background: linear-gradient(135deg, #1a2332 0%, #1c2a1c 100%);
  border: 1px solid var(--green); border-radius: var(--radius);
  padding: 20px 24px; position: relative; overflow: hidden;
}
.hint-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--green);
}
.hint-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--green); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.hint-label svg { width: 14px; height: 14px; }
.hint-headline {
  font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 6px;
}
.hint-summary {
  font-size: 0.85rem; color: var(--text-dim); line-height: 1.6;
}
.hint-source {
  margin-top: 10px; font-size: 0.7rem; color: var(--text-muted);
}
.hint-source a { color: var(--blue); text-decoration: none; }
.hint-source a:hover { text-decoration: underline; }
.hint-verified {
  display: inline-flex; align-items: center; gap: 3px;
  color: var(--green); font-size: 0.65rem; font-weight: 600;
}

/* Feed */
.feed { max-width: var(--max-w); margin: 0 auto; padding: 0 24px 40px; }
.feed-section-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-muted);
  padding: 12px 0 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

/* Feed item */
.feed-item {
  padding: 14px 0; border-bottom: 1px solid rgba(48, 54, 61, 0.5);
  display: flex; gap: 14px; align-items: flex-start;
  transition: background 0.15s; cursor: default;
}
.feed-item:hover { background: rgba(88, 166, 255, 0.03); }
.feed-type-badge {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
  padding: 3px 8px; border-radius: 3px; white-space: nowrap;
  text-transform: uppercase; flex-shrink: 0; margin-top: 2px;
}
.feed-type-badge.update { background: rgba(88,166,255,0.15); color: var(--blue); }
.feed-type-badge.breaking { background: rgba(248,81,73,0.15); color: var(--red); }
.feed-type-badge.tool { background: rgba(232,122,46,0.15); color: var(--orange); }
.feed-type-badge.opportunity { background: rgba(63,185,80,0.15); color: var(--green); }
.feed-type-badge.hint { background: rgba(255,209,102,0.15); color: var(--yellow); }

.feed-content { flex: 1; min-width: 0; }
.feed-headline {
  font-size: 0.9rem; font-weight: 600; color: var(--text);
  margin-bottom: 4px; line-height: 1.4;
}
.feed-summary {
  font-size: 0.8rem; color: var(--text-dim); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.feed-meta {
  display: flex; align-items: center; gap: 10px; margin-top: 6px;
  font-size: 0.7rem; color: var(--text-muted);
}
.feed-meta a { color: var(--blue); text-decoration: none; }
.feed-meta a:hover { text-decoration: underline; }
.feed-niches {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.niche-tag {
  font-size: 0.6rem; padding: 1px 6px; border-radius: 3px;
  background: rgba(91,192,190,0.1); color: var(--teal); font-weight: 500;
}
.verified-badge {
  color: var(--green); display: inline-flex; align-items: center; gap: 2px;
}

/* Ticker bar (bottom) */
.ticker-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card); border-top: 1px solid var(--border);
  padding: 8px 0; overflow: hidden; z-index: 10; cursor: default;
}
.ticker-track {
  display: flex; gap: 40px; white-space: nowrap;
  animation: ticker 90s linear infinite;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.ticker-item {
  font-size: 0.7rem; font-family: var(--mono); color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
}
.ticker-item .ticker-type {
  font-weight: 700; font-size: 0.6rem; padding: 1px 5px; border-radius: 2px;
}
.ticker-item .ticker-type.up { background: rgba(63,185,80,0.15); color: var(--green); }
.ticker-item .ticker-type.new { background: rgba(232,122,46,0.15); color: var(--orange); }

/* Empty state */
.empty-feed {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.empty-feed .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
.empty-feed p { font-size: 0.9rem; max-width: 400px; margin: 0 auto; }

/* Back link */
.back-link {
  color: var(--text-dim); font-size: 0.8rem; text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.back-link:hover { color: var(--text); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.85rem; }
.loading .spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--orange); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 640px) {
  html { font-size: 14px; }
  .pulse-header { padding: 12px 16px; }
  .filter-bar { padding: 10px 16px; }
  .daily-hint { padding: 0 16px; }
  .feed { padding: 0 16px 60px; }
  .hint-card { padding: 16px 18px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- Header -->
<header class="pulse-header">
  <div class="pulse-header-inner">
    <a href="/" class="pulse-brand">
      <svg viewBox="0 0 28 28" fill="none"><path d="M14 2L3 26h6l5-12 5 12h6L14 2z" fill="#e87a2e"/></svg>
      ANVIL <span class="pulse-label">PULSE</span>
    </a>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="/" class="back-link">Home</a>
      <a href="/learn.html" class="back-link">Learn</a>
      <div class="pulse-status"><span class="dot"></span> LIVE</div>
    </div>
  </div>
</header>

<!-- Niche filters -->
<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" data-niche="">All Niches</button>
  <button class="filter-chip" data-niche="medical-billing">Medical Billing</button>
  <button class="filter-chip" data-niche="benefits">Benefits Navigation</button>
  <button class="filter-chip" data-niche="compliance">Compliance</button>
  <button class="filter-chip" data-niche="grant-writing">Grant Writing</button>
  <button class="filter-chip" data-niche="insurance">Insurance Appeals</button>
  <button class="filter-chip" data-niche="bookkeeping">Bookkeeping</button>
  <button class="filter-chip" data-niche="real-estate">Real Estate</button>
</div>

<!-- Feed status bar -->
<div style="max-width:var(--max-w);margin:0 auto;padding:4px 24px;display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-muted);font-family:var(--mono);">
  <span id="feedStatusLeft">Loading sources...</span>
  <span id="feedStatusRight"></span>
</div>

<!-- Daily hint -->
<div class="daily-hint" id="dailyHintSection">
  <div class="hint-card" id="hintCard" style="display:none">
    <div class="hint-label">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5c-2.363 0-4 1.69-4 3.75 0 .984.424 1.625.984 2.304l.214.253c.223.264.47.556.673.848.284.411.537.896.621 1.49a.75.75 0 01-1.484.211c-.04-.282-.163-.547-.37-.847a8.456 8.456 0 00-.542-.68c-.084-.1-.173-.205-.268-.32C3.201 7.75 2.5 6.766 2.5 5.25 2.5 2.31 4.863.5 8 .5s5.5 1.81 5.5 4.75c0 1.516-.701 2.5-1.328 3.259a10.28 10.28 0 01-.268.32 8.456 8.456 0 00-.542.68c-.207.3-.33.565-.37.847a.751.751 0 01-1.485-.212c.084-.593.337-1.078.621-1.489.203-.292.45-.584.673-.848.075-.088.147-.173.213-.253.561-.679.985-1.32.985-2.304 0-2.06-1.637-3.75-4-3.75zM6 15.25a.75.75 0 01.75-.75h2.5a.75.75 0 010 1.5h-2.5a.75.75 0 01-.75-.75zM5.75 12a.75.75 0 000 1.5h4.5a.75.75 0 000-1.5h-4.5z"/></svg>
      One Thing to Learn Today
    </div>
    <div class="hint-headline" id="hintHeadline"></div>
    <div class="hint-summary" id="hintSummary"></div>
    <div class="hint-source" id="hintSource"></div>
  </div>
</div>

<!-- Feed -->
<div class="feed" id="feed">
  <div class="loading" id="feedLoading">
    <div class="spinner"></div>
    Loading intelligence feed...
  </div>
</div>

<!-- Ticker bar -->
<div class="ticker-bar" id="tickerBar" style="display:none">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<script>
(function() {
  'use strict';

  var currentNiche = '';
  var feedData = [];

  var TYPE_LABELS = {
    update: 'Industry Update', breaking: 'Breaking News',
    tool: 'New Tool', opportunity: 'Opportunity', hint: 'Pro Tip'
  };
  var NICHE_LABELS = {
    'medical-billing': 'Healthcare', benefits: 'Benefits',
    compliance: 'Compliance', 'grant-writing': 'Grants',
    insurance: 'Insurance', bookkeeping: 'Finance',
    'real-estate': 'Real Estate', all: 'AI News'
  };

  function formatSlug(s) {
    return s.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  // -- Filter chips --
  document.getElementById('filterBar').addEventListener('click', function(e) {
    var chip = e.target.closest('.filter-chip');
    if (!chip) return;
    document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
    chip.classList.add('active');
    currentNiche = chip.getAttribute('data-niche') || '';
    loadFeed();
    loadHint();
  });

  // -- Load daily hint --
  function loadHint() {
    var url = '/api/pulse/daily-hint';
    if (currentNiche) url += '?niche=' + encodeURIComponent(currentNiche);

    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var card = document.getElementById('hintCard');
        if (!data.success || !data.hint) {
          card.style.display = 'none';
          return;
        }
        var h = data.hint;
        document.getElementById('hintHeadline').textContent = h.headline || '';
        document.getElementById('hintSummary').textContent = h.summary || '';

        var src = document.getElementById('hintSource');
        var parts = [];
        if (h.sourceName) {
          if (h.sourceUrl) {
            var a = document.createElement('a');
            a.href = h.sourceUrl;
            a.textContent = h.sourceName;
            a.target = '_blank';
            a.rel = 'noopener';
            parts.push(a.outerHTML);
          } else {
            parts.push(h.sourceName);
          }
        }
        if (h.verified) {
          parts.push('<span class="verified-badge"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg> Verified</span>');
        }
        if (h.publishedAt) {
          parts.push(timeAgo(h.publishedAt));
        }
        src.innerHTML = parts.join(' &middot; ');
        card.style.display = '';
      })
      .catch(function() {
        document.getElementById('hintCard').style.display = 'none';
      });
  }

  // -- Load feed --
  function loadFeed() {
    var url = '/api/pulse?limit=30';
    if (currentNiche) url += '&niche=' + encodeURIComponent(currentNiche);

    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('feedLoading').style.display = 'none';
        if (!data.success || !data.items || data.items.length === 0) {
          document.getElementById('feed').innerHTML =
            '<div class="empty-feed">' +
            '<div class="empty-icon">&#x1F4E1;</div>' +
            '<p>No intelligence updates yet. The ANVIL Pulse feed will populate with real-time AI industry updates curated for your niche.</p>' +
            '</div>';
          return;
        }

        feedData = data.items;
        renderFeed(feedData);
        buildTicker(feedData.slice(0, 8));
      })
      .catch(function() {
        document.getElementById('feedLoading').style.display = 'none';
        document.getElementById('feed').innerHTML =
          '<div class="empty-feed"><p>Failed to load feed. Please try again.</p></div>';
      });
  }

  // -- Render feed items --
  function renderFeed(items) {
    var feed = document.getElementById('feed');

    if (items.length === 0 && currentNiche) {
      var nicheLabel = NICHE_LABELS[currentNiche] || formatSlug(currentNiche);
      feed.innerHTML = '<div class="empty-feed"><p>Showing updates for ' + escapeHtml(nicheLabel) + '. More stories refresh every 2 hours.</p></div>';
      return;
    }

    // Group items by primary niche for section headers
    var grouped = [];
    var lastNiche = null;
    items.forEach(function(item) {
      var primary = (item.niches && item.niches[0]) || 'all';
      if (primary !== lastNiche) {
        grouped.push({ type: 'header', niche: primary });
        lastNiche = primary;
      }
      grouped.push({ type: 'item', data: item });
    });

    var html = '';
    grouped.forEach(function(entry) {
      if (entry.type === 'header') {
        var label = NICHE_LABELS[entry.niche] || formatSlug(entry.niche);
        html += '<div class="feed-section-label">' + escapeHtml(label) + '</div>';
        return;
      }
      var item = entry.data;
      var typeClass = item.type || 'update';
      var typeLabel = TYPE_LABELS[typeClass] || 'Update';

      var niches = (item.niches || []).filter(function(n) { return n !== 'all'; });
      var nichesHtml = niches.length > 0
        ? '<div class="feed-niches">' + niches.map(function(n) {
            return '<span class="niche-tag">' + escapeHtml(NICHE_LABELS[n] || formatSlug(n)) + '</span>';
          }).join('') + '</div>'
        : '';

      var metaParts = [];
      if (item.sourceName && item.sourceUrl) {
        metaParts.push('<a href="' + escapeAttr(item.sourceUrl) + '" target="_blank" rel="noopener">' + escapeHtml(item.sourceName) + '</a>');
      } else if (item.sourceName) {
        metaParts.push(escapeHtml(item.sourceName));
      }
      if (item.verified) {
        metaParts.push('<span class="verified-badge"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg> Verified</span>');
      }
      if (item.publishedAt) {
        metaParts.push(timeAgo(item.publishedAt));
      }

      html += '<div class="feed-item">' +
        '<span class="feed-type-badge ' + typeClass + '">' + typeLabel + '</span>' +
        '<div class="feed-content">' +
          (item.sourceUrl
            ? '<a href="' + escapeAttr(item.sourceUrl) + '" target="_blank" rel="noopener" class="feed-headline" style="text-decoration:none;color:inherit;">' + escapeHtml(item.headline) + ' <span style="font-size:0.7em;color:var(--teal);">&#x2197;</span></a>'
            : '<div class="feed-headline">' + escapeHtml(item.headline) + '</div>') +
          '<div class="feed-summary">' + escapeHtml(item.summary) + '</div>' +
          '<div class="feed-meta">' + metaParts.join(' &middot; ') + ' ' + nichesHtml + '</div>' +
        '</div>' +
      '</div>';
    });

    feed.innerHTML = html;
  }

  // -- Build ticker --
  function buildTicker(items) {
    if (items.length === 0) return;
    var track = document.getElementById('tickerTrack');
    var html = '';
    // Double the items for seamless loop
    var doubled = items.concat(items);
    doubled.forEach(function(item) {
      var typeClass = item.type === 'opportunity' ? 'up' : 'new';
      var typeLabel = TYPE_LABELS[item.type] || 'Update';
      html += '<span class="ticker-item">' +
        '<span class="ticker-type ' + typeClass + '">' + typeLabel + '</span> ' +
        escapeHtml((item.headline || '').slice(0, 60)) +
      '</span>';
    });
    track.innerHTML = html;
    var duration = Math.max(60, doubled.length * 8);
    track.style.animationDuration = duration + 's';
    document.getElementById('tickerBar').style.display = '';
  }

  // -- Helpers --
  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function escapeAttr(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function timeAgo(ts) {
    var diff = Date.now() - new Date(ts).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    if (days < 7) return days + 'd ago';
    return new Date(ts).toLocaleDateString();
  }

  // -- Load feed status --
  function loadStatus() {
    fetch('/api/pulse/status')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) return;
        var healthy = data.healthySources || data.sourceCount;
        var left = data.totalItems + ' articles \u00B7 ' + healthy + '/' + data.sourceCount + ' sources healthy';
        if (data.notModified > 0) left += ' \u00B7 ' + data.notModified + ' cached';
        document.getElementById('feedStatusLeft').textContent = left;
        if (data.lastRefresh) {
          document.getElementById('feedStatusRight').textContent = 'Updated ' + timeAgo(data.lastRefresh);
        }
      })
      .catch(function() {});
  }

  // -- Init --
  loadHint();
  loadFeed();
  loadStatus();

  // Auto-refresh every 5 minutes
  setInterval(function() { loadHint(); loadFeed(); loadStatus(); }, 5 * 60 * 1000);
})();
</script>
</body>
</html>
